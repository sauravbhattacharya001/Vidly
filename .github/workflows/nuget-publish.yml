name: NuGet — Publish to GitHub Packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override (e.g. 1.1.0)"
        required: false
      publish_nuget_org:
        description: "Also publish to nuget.org"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  publish:
    name: Build & Publish NuGet Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $ver = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            $ver = "1.0.0"
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $ver"

      - name: Setup NuGet
        uses: nuget/setup-nuget@v4
        with:
          nuget-version: "latest"

      - name: Add GitHub Packages source
        run: |
          nuget sources add -Name "github" `
            -Source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json" `
            -UserName ${{ github.actor }} `
            -Password ${{ secrets.GITHUB_TOKEN }} `
            -StorePasswordInClearText

      - name: Restore NuGet packages
        run: nuget restore Vidly.sln

      - name: Build Release
        shell: pwsh
        run: |
          # Find MSBuild
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1

          if (-not $msbuild) {
            Write-Host "::error::MSBuild not found"
            exit 1
          }

          Write-Host "Using MSBuild: $msbuild"
          & $msbuild Vidly\Vidly.csproj /p:Configuration=Release /verbosity:minimal

      - name: Pack NuGet package
        shell: pwsh
        run: |
          nuget pack Vidly.nuspec -Version ${{ steps.version.outputs.version }} -Properties "Configuration=Release" -OutputDirectory ./nupkg -Symbols -SymbolPackageFormat snupkg

      - name: Generate SBOM
        shell: pwsh
        run: |
          # Generate a CycloneDX-style SBOM from packages.config
          $packagesConfig = "Vidly/packages.config"
          if (Test-Path $packagesConfig) {
            [xml]$packages = Get-Content $packagesConfig
            $components = @()
            foreach ($pkg in $packages.packages.package) {
              $components += @{
                type = "library"
                name = $pkg.id
                version = $pkg.version
                purl = "pkg:nuget/$($pkg.id)@$($pkg.version)"
              }
            }
            $sbom = @{
              bomFormat = "CycloneDX"
              specVersion = "1.5"
              serialNumber = "urn:uuid:$([guid]::NewGuid())"
              version = 1
              metadata = @{
                timestamp = (Get-Date -Format o)
                component = @{
                  type = "application"
                  name = "Vidly"
                  version = "${{ steps.version.outputs.version }}"
                  purl = "pkg:nuget/Vidly@${{ steps.version.outputs.version }}"
                }
              }
              components = $components
            }
            $sbom | ConvertTo-Json -Depth 10 | Out-File -FilePath ./nupkg/vidly-sbom.cdx.json -Encoding utf8
            Write-Host "SBOM generated with $($components.Count) components"
          } else {
            Write-Host "::warning::packages.config not found — skipping SBOM"
          }

      - name: Verify package integrity
        shell: pwsh
        run: |
          $pkg = Get-ChildItem ./nupkg -Filter "*.nupkg" -Exclude "*.snupkg" | Select-Object -First 1
          if (-not $pkg) {
            Write-Host "::error::No .nupkg file found"
            exit 1
          }
          # Verify it's a valid ZIP archive (NuGet packages are ZIP files)
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          try {
            $zip = [System.IO.Compression.ZipFile]::OpenRead($pkg.FullName)
            $entries = $zip.Entries.Count
            $zip.Dispose()
            Write-Host "✅ Package valid: $($pkg.Name) ($entries entries, $([math]::Round($pkg.Length / 1KB, 1)) KB)"
          } catch {
            Write-Host "::error::Package is corrupted: $_"
            exit 1
          }
          # Compute SHA256 for provenance
          $hash = (Get-FileHash $pkg.FullName -Algorithm SHA256).Hash
          Write-Host "SHA256: $hash"
          echo "PACKAGE_SHA256=$hash" >> $env:GITHUB_ENV
          echo "PACKAGE_NAME=$($pkg.Name)" >> $env:GITHUB_ENV

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            ./nupkg/*.nupkg
            ./nupkg/*.snupkg
            ./nupkg/*-sbom.cdx.json
          retention-days: 90

      - name: Push to GitHub Packages
        run: |
          nuget push ./nupkg/*.nupkg -Source "github" -ApiKey ${{ secrets.GITHUB_TOKEN }} -SkipDuplicate

      - name: Push to nuget.org
        if: github.event.inputs.publish_nuget_org == 'true' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ($env:NUGET_API_KEY) {
            nuget push ./nupkg/*.nupkg -Source https://api.nuget.org/v3/index.json -ApiKey $env:NUGET_API_KEY -SkipDuplicate
          } else {
            Write-Host "::warning::NUGET_API_KEY secret not set — skipping nuget.org publish"
          }

      - name: Summary
        shell: pwsh
        run: |
          $pkg = Get-ChildItem ./nupkg -Filter "*.nupkg" -Exclude "*.snupkg" | Select-Object -First 1
          $sbomExists = Test-Path ./nupkg/vidly-sbom.cdx.json
          $summary = @"
          ## 📦 NuGet Package Published

          | Property | Value |
          |----------|-------|
          | **Package** | Vidly v${{ steps.version.outputs.version }} |
          | **Size** | $([math]::Round($pkg.Length / 1KB, 1)) KB |
          | **SHA256** | ``$env:PACKAGE_SHA256`` |
          | **SBOM** | $(if ($sbomExists) { '✅ CycloneDX 1.5' } else { '⚠️ Not generated' }) |
          | **GitHub Packages** | ✅ Published |
          | **nuget.org** | $(if ('${{ github.event.inputs.publish_nuget_org }}' -eq 'true' -or '${{ github.ref }}'.StartsWith('refs/tags/v')) { '✅ Published' } else { '⏭️ Skipped' }) |

          ### Install

          **GitHub Packages:**
          ``````shell
          dotnet add package Vidly --version ${{ steps.version.outputs.version }} --source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json"
          ``````

          **nuget.org:**
          ``````shell
          dotnet add package Vidly --version ${{ steps.version.outputs.version }}
          ``````
          "@
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
