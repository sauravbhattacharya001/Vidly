name: Issue Triage

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  add-triage:
    name: Add needs-triage to new issues
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Add needs-triage label
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            });

  remove-triage:
    name: Remove needs-triage when triaged
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name != 'needs-triage' &&
      github.event.label.name != 'stale'
    runs-on: ubuntu-latest
    steps:
      - name: Check for needs-triage label
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            return labels.includes('needs-triage');
          result-encoding: string

      - name: Remove needs-triage
        if: steps.check.outputs.result == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'needs-triage'
            });
