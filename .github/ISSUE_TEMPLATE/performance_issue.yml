name: "⚡ Performance Issue"
description: Report a performance regression or bottleneck in Vidly
title: "[perf]: "
labels: ["performance", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a performance issue! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Performance Issue Description
      description: Describe the performance problem you're experiencing.
      placeholder: "e.g. API response time doubled after upgrading to v2.x"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this performance issue?
      placeholder: |
        1. Start the application with `dotnet run`
        2. Send 100 concurrent requests to `/api/movies`
        3. Observe response times > 2 seconds
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Performance
      description: What response time or throughput did you expect?
      placeholder: "e.g. < 200ms per request under 100 concurrent users"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Performance
      description: Include metrics, profiler output, or benchmarks if available.
      placeholder: |
        Response times: avg 2.3s, p95 4.1s, p99 8.7s
        CPU usage: 95% on 4-core machine
        Memory: 1.2GB RSS
    validations:
      required: true

  - type: input
    id: dataset-size
    attributes:
      label: Dataset Size
      description: How much data is in the database?
      placeholder: "e.g. 50,000 movies, 200,000 rentals"

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Development (local)
        - Docker
        - Azure / Cloud
        - Other
    validations:
      required: true

  - type: textarea
    id: environment-details
    attributes:
      label: Environment Details
      description: ".NET version, OS, database, hardware specs"
      placeholder: |
        - .NET 8.0
        - Windows 11 / Ubuntu 22.04
        - SQL Server 2022 / SQLite
        - 16GB RAM, 8 cores
    validations:
      required: true

  - type: textarea
    id: profiling
    attributes:
      label: Profiling Data
      description: Attach profiler output, flame graphs, or slow query logs if available.
      placeholder: "Paste profiler output, dotnet-trace results, or SQL EXPLAIN plans"
