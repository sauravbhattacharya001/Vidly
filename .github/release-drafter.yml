name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - enhancement
      - feature
  - title: '🐛 Bug Fixes'
    labels:
      - bug
      - fix
  - title: '🔒 Security'
    labels:
      - security
  - title: '⚡ Performance'
    labels:
      - performance
  - title: '📦 Dependencies'
    labels:
      - dependencies
  - title: '📝 Documentation'
    labels:
      - documentation
  - title: '🧪 Tests'
    labels:
      - tests
  - title: '🏗️ CI/CD'
    labels:
      - ci
  - title: '🎨 UI/UX'
    labels:
      - ui

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
      - feature
  patch:
    labels:
      - bug
      - fix
      - dependencies
      - documentation
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
